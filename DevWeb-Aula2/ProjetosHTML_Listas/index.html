<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projeto HTML Listas</title>
  </head>
  <body>
    <h1>Utilizando listas não odernadas:</h1>
    <!-- Tipos de Lista não ordenada: Circle, square, disc e none -->
    <ul >
      <li>Arroz</li>
      <li>Feijão</li>
      <li>Frango</li>
      <li>Normalmente usada para criar menu nas Páginas Web</li>
    </ul>
    <h1>Utilizando listas ordenadas</h1>
    <!-- Lista ordenada: 1, 2, 3 e etc -->
    <ol>
        <li>Arroz</li>
        <li>Feijão</li>
        <li>Frango</li>
        <li>Chocolate</li>
    </ol>
    <h1>Uilizando listas de definição</h1>
    
        <dl>
            <dt>HTML</dt>
            <dd>Linguagem de marcação de hyper text</dd>

            <dt>CSS</dt>
            <dd>Estilo de paginas Web</dd>
        </dl>
    
  </body>
</html>
