<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tabelas</title>

    <style>
        table,tr,th,td{
            border: solid 2px;
            border-collapse: collapse;
            
        }
        th{
            background-color: rgb(62, 202, 202);
        }
    </style>
</head>
<body>
    <h1>Utilizando tabelas no Html</h1>
    <table>
        <tr><th>Empresa</th><th>Contato</th><th>Cargo</th></tr>  <!--th define o cabeçalho -->

       <tr><td>Senai</td><td>André</td><td>Professor</td></tr>   <!--tr linha da tabela -->

       <tr><td>Sesi</td><td>Jose</td><td>Coordenador</td></tr>   <!--td celula da teabela -->

    </table>
    
</body>
</html>
