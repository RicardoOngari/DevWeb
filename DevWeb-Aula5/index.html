<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Formulários</title>
</head>
<body style="background-color: rgb(255, 228, 196); font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">

    <h2>Formulário para coleta de dados do usuario:</h1>
    <form action=""> <!-- o action é o endereço do servidor back/API -->
        <!-- label serve para indentificar os campos -->
        <label for="nome">Nome:</label>
        <input type="text" name="nome" id="nome"><br><br>
        <label for="sobrenome">Sobrenome:</label>
        <input type="text" name="sobrenome" id="sobrenome"><br><br>

        <input type="submit" value="Enviar" style="">
    </form>

    <h2>Formulário para opções utilizando "radio", linguagem favorita:</h2>
    <!-- type-radio, somente uma resposta -->
    <form action=""> <!-- o action é o endereço do servidor back/API -->
    <input type="radio" name="linguagem_favorita" id="html" value="html">
    <label for="html">HTML</label><br>

    <input type="radio" name="linguagem_favorita" id="css" value="css">
    <label for="css">CSS</label><br>

    <input type="radio" name="linguagem_favorita" id="js" value="js">
    <label for="js">JavaScript</label><br><br>

    <input type="submit" value="Enviar" style="">
    </form>


    <h2>Formulario utilizando "chekbox":</h2>
    <!-- checkbox, varias respostas -->
    <form action="">  <!-- o action é o endereço do servidor back/API -->

    <input type="checkbox" name="bike" id="bike">
    <label for="">Bicicleta</label><br>

    <input type="checkbox" name="skate" id="skate">
    <label for="">Skate</label><br>

    <input type="checkbox" name="patinete" id="patinete">
    <label for="">Patinete</label><br><br>

    <input type="submit" value="Enviar" >
    </form>

    <h2>Formulário com caixa de opção com select:</h2>
    <form action="">
        <label for="">Celulares:</label>
        <select name="celulares" id="celulares">
            <option value="escolha" disabled selected></option>
            <option value="iphone">Iphone</option>
            <option value="samsung">Samsung</option>
            <option value="motorola">Motorola</option>
            <option value="xiaomi">xiaomi</option>
        </select>
    </form><br>
    <!-- Area de entrada de textos grandes -->
     <label for="">Escreva sobre seu celular:</label><br>
    <textarea name="obs" id="obs" rows="5" cols="30" placeholder="Observação..."></textarea>
    
</body>
</html>
